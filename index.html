    <link rel="canonical" href="https://alphaconvenios.com.br/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://innovat-rho.vercel.app/" />
    <meta property="og:title"       content="Alpha Convênios — Planos de Saúde com Cotação Grátis em 5 Minutos" />

    <!-- Critical CSS inline — elimina render-blocking (PageSpeed) -->
    <!-- Cobre apenas o above-the-fold: nav, hero-layout, tokens e base -->
    <style>
      :root{--brand-primary:#0056A7;--brand-dark:#003d7a;--brand-mid:#1863DC;--accent-cta:#1863DC;--accent-cta-h:#0e4db5;--text-dark:#1a1a2e;--text-body:#3d3d5c;--bg-white:#ffffff;--trans-fast:180ms cubic-bezier(.4,0,.2,1);--trans-med:320ms cubic-bezier(.4,0,.2,1)}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth;font-size:16px;-webkit-text-size-adjust:100%}
      body{font-family:'Manrope','Inter',system-ui,sans-serif;background-color:#fff;color:#1a1a2e;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
      img,video{display:block;max-width:100%}
      a{color:inherit;text-decoration:none}
      button{cursor:pointer;font-family:inherit;border:none;background:none}
      h1,h2,h3,h4{font-family:'Montserrat','Manrope',sans-serif;font-weight:700;line-height:1.15;color:#1a1a2e;letter-spacing:-.02em}
      .container{width:100%;max-width:1200px;margin-inline:auto;padding-inline:1rem}
      @media(min-width:640px){.container{padding-inline:1.5rem}}
      @media(min-width:1024px){.container{padding-inline:2rem}}
      .nav{position:fixed;top:0;left:0;right:0;z-index:200;padding-block:.875rem;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid transparent;transition:background var(--trans-med),box-shadow var(--trans-med)}
      .nav-inner{display:flex;align-items:center;justify-content:space-between;gap:1rem}
      .nav-logo{display:flex;align-items:center;gap:.625rem}
      .nav-logo img{height:80px;width:auto;aspect-ratio:300/90;object-fit:contain}
      .nav-mobile-btn{display:flex;color:#1a1a2e;transition:color var(--trans-fast);padding:.25rem}
      .nav-links-desktop{display:none;align-items:center;gap:2.5rem}
      @media(min-width:1024px){.nav-links-desktop{display:flex}.nav-mobile-btn{display:none}}
      .skip-link{position:absolute;top:-100%;left:1rem;background:#1863DC;color:#fff;padding:.5rem 1rem;border-radius:0 0 .5rem .5rem;font-weight:700;z-index:9999;transition:top .2s}
      .skip-link:focus{top:0}
      #root{min-height:100vh}
    </style>

    <!-- Preconnect crítico — evita round-trips no critical path -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: apenas os pesos utilizados, display=swap para evitar FOIT -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&family=Montserrat:wght@700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&family=Montserrat:wght@700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload do logo — crítico para LCP -->
    <link
      rel="preload"
      as="image"
      href="/logo.webp"
      type="image/webp"
      fetchpriority="high"
    />

    <title>Alpha Convênios — Planos de Saúde com Cotação Grátis em 5 Minutos</title>
    <link rel="icon" type="image/webp" href="/icone.webp" />

          if (loaded) return;
          loaded = true;
          const events = ['scroll', 'mousemove', 'touchstart', 'keydown', 'click'];
          events.forEach(e => window.removeEventListener(e, loadGtag));

          const s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=AW-18191984976';
          document.head.appendChild(s);
        }
        const events = ['scroll', 'mousemove', 'touchstart', 'keydown', 'click'];
        events.forEach(e => window.addEventListener(e, loadGtag, { passive: true }));
